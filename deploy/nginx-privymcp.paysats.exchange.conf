# paysats_v2 MCP (Next.js) reverse proxy — privymcp.paysats.exchange
#
# Install:
#   sudo cp deploy/nginx-privymcp.paysats.exchange.conf /etc/nginx/sites-available/paysats-v2-mcp
#   sudo ln -sf /etc/nginx/sites-available/paysats-v2-mcp /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/basemcp.paysats.exchange  # if the old vhost was linked
#   sudo nginx -t && sudo systemctl reload nginx
# TLS (after DNS A record -> server is live):
#   sudo certbot --nginx -d privymcp.paysats.exchange --redirect
#
# App runs under pm2 as "paysats-v2-mcp": PORT=3400 next start (cwd ~/paysats_v2)

server {
    listen 80;
    listen [::]:80;
    server_name privymcp.paysats.exchange;

    # JSON-RPC tool bodies are small; allow a little headroom.
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:3400;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Streamable HTTP / SSE: don't buffer, keep idle connections open.
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
